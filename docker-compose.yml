services:
  monitoring:
    build: .
    container_name: lucos_monitoring
    ports: 
      - $PORT:$PORT
    environment:
      - SEND_ADDRESS
      - SEND_PASSWORD
      - SMTP_RELAY
      - TO_ADDRESS
      - PORT
      - LOGANNE_ENDPOINT
      - APP_ORIGIN
      - CLIENT_KEYS
      - SCHEDULE_TRACKER_ENDPOINT
      - CIRCLECI_API_TOKEN
      - LOG_LEVEL
      - SYSTEM
    image: lucas42/lucos_monitoring:${VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 -qO- http://127.0.0.1:${PORT:-8080}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:1::/64