services:
  monitoring:
    build: .
    container_name: monitoring
    ports: 
      - $PORT:$PORT
    environment:
      - SEND_ADDRESS
      - SEND_PASSWORD
      - SMTP_RELAY
      - TO_ADDRESS
      - PORT
      - LOGANNE_ENDPOINT
    image: lucas42/lucos_monitoring
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --tries=1 -qO- http://127.0.0.1:${PORT:-8080}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    network_mode: host
