version: 2.1

jobs:
  test:
    docker:
      - image: erlang:28
    steps:
      - checkout
      - run:
          name: Run Tests
          command: rebar3 do eunit --cover, cover
      - store_artifacts:
          path: _build/test/cover

orbs:
  lucos: lucos/deploy@0
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - test
            - lucos/build
          filters:
            branches:
              only:
                - main